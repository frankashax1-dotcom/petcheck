{% extends "base.html" %}
{% block title %}Register — PetCheck{% endblock %}

{% block content %}
<div class="register-container" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 5%; background: linear-gradient(135deg, #fef7ed 0%, #fff4e8 100%);">
  <div class="register-card" style="background: white; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 500px; overflow: hidden;">
    
    <div class="register-header" style="background: linear-gradient(135deg, #e0702a, #c25a1f); padding: 30px; text-align: center; color: white;">
      <div style="font-size: 3rem; margin-bottom: 10px;">🐾</div>
      <h1 style="font-size: 1.8rem; font-weight: 700;">Create Account</h1>
      <p style="font-size: 0.9rem; opacity: 0.9;">Join PetCheck and keep your pet healthy</p>
    </div>

    <div class="register-body" style="padding: 35px;">
      
      {% if error %}
      <div style="background: #ffe0e0; border-left: 4px solid #e74c3c; padding: 12px 15px; border-radius: 12px; margin-bottom: 20px;">
        <span style="color: #c0392b;">{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/register">
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 600;">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Enter your full name" required style="width: 100%; padding: 14px 16px; border: 2px solid #e8e0d5; border-radius: 12px;">
        </div>

        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 600;">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required style="width: 100%; padding: 14px 16px; border: 2px solid #e8e0d5; border-radius: 12px;">
        </div>

        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 600;">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Create a password (min 6 characters)" required style="width: 100%; padding: 14px 16px; border: 2px solid #e8e0d5; border-radius: 12px;">
        </div>

        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 600;">I am a...</label>
          <div style="display: flex; gap: 15px;">
            <label style="flex: 1; background: #f5f0e8; border: 2px solid #e8e0d5; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer;">
              <input type="radio" name="role" value="pet_owner" checked style="display: none;"> 🐶 Pet Owner
            </label>
            <label style="flex: 1; background: #f5f0e8; border: 2px solid #e8e0d5; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer;">
              <input type="radio" name="role" value="vet" style="display: none;"> 🩺 Veterinarian
            </label>
          </div>
        </div>

        <button type="submit" style="width: 100%; background: linear-gradient(135deg, #e0702a, #c25a1f); color: white; border: none; padding: 14px; border-radius: 50px; font-size: 1rem; font-weight: 600; cursor: pointer;">
          Create Account →
        </button>
      </form>

      <div style="text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e8e0d5;">
        <span style="color: #666;">Already have an account? </span>
        <a href="/login" style="color: #e0702a; text-decoration: none; font-weight: 600;">Log In</a>
      </div>
    </div>
  </div>
</div>

<script>
  // Role selection styling
  const roleOptions = document.querySelectorAll('.register-body label');
  roleOptions.forEach(option => {
    option.addEventListener('click', () => {
      roleOptions.forEach(opt => {
        opt.style.borderColor = '#e8e0d5';
        opt.style.background = '#f5f0e8';
      });
      option.style.borderColor = '#e0702a';
      option.style.background = 'rgba(224,112,42,0.1)';
      const radio = option.querySelector('input[type="radio"]');
      if (radio) radio.checked = true;
    });
  });
</script>
{% endblock %}
