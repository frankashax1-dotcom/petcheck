{% extends "base.html" %}
{% block title %}Health Articles — PetCheck{% endblock %}

{% block extra_css %}
<style>
  .articles-hero {
    background: linear-gradient(135deg, #e0702a, #c25a1f);
    padding: 60px 5%;
    text-align: center;
    color: white;
    margin-bottom: 40px;
  }

  .articles-hero h1 {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 15px;
  }

  .articles-hero p {
    font-size: 1.1rem;
    opacity: 0.9;
  }

  .category-filter {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .filter-btn {
    background: white;
    border: 2px solid #e8e0d5;
    padding: 10px 24px;
    border-radius: 50px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    color: #5a4e42;
  }

  .filter-btn:hover, .filter-btn.active {
    background: #e0702a;
    border-color: #e0702a;
    color: white;
  }

  .articles-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 5% 60px;
  }

  .articles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 30px;
  }

  .article-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    transition: all 0.3s;
    cursor: pointer;
    text-decoration: none;
    display: block;
  }

  .article-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
  }

  .article-image {
    height: 200px;
    background-size: cover;
    background-position: center;
    position: relative;
  }

  .article-category {
    position: absolute;
    top: 15px;
    left: 15px;
    background: #e0702a;
    color: white;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
  }

  .article-content {
    padding: 20px;
  }

  .article-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #1a1d26;
    margin-bottom: 10px;
  }

  .article-excerpt {
    font-size: 0.85rem;
    color: #666;
    line-height: 1.5;
    margin-bottom: 15px;
  }

  .article-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: #999;
    padding-top: 10px;
    border-top: 1px solid #eee;
  }

  .read-more {
    color: #e0702a;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: gap 0.3s;
  }

  .article-card:hover .read-more {
    gap: 10px;
  }

  @media (max-width: 768px) {
    .articles-grid { grid-template-columns: 1fr; }
    .filter-btn { padding: 6px 16px; font-size: 0.8rem; }
  }
</style>
{% endblock %}

{% block content %}
<div class="articles-hero">
  <h1>📚 Pet Health Library</h1>
  <p>Expert-written guides on pet diseases, nutrition, and preventive care</p>
</div>

<div class="articles-container">
  <div class="category-filter">
    <button class="filter-btn active" data-category="all">All</button>
    <button class="filter-btn" data-category="dogs">🐕 Dogs</button>
    <button class="filter-btn" data-category="cats">🐈 Cats</button>
    <button class="filter-btn" data-category="nutrition">🥗 Nutrition</button>
    <button class="filter-btn" data-category="prevention">🛡️ Prevention</button>

  <div class="articles-grid" id="articlesGrid"></div>
</div>

      image: "https://i.imgur.com/xnBSCKw.jpeg",

      date: "Nov 10, 2023"
    }
  ];

  function renderArticles(category = 'all') {
    const grid = document.getElementById('articlesGrid');
    const filtered = category === 'all' ? articles : articles.filter(a => a.category === category);
    
    if (filtered.length === 0) {
      grid.innerHTML = '<div style="text-align:center; padding:60px;">No articles found in this category</div>';
      return;
    }
    
    grid.innerHTML = filtered.map(article => `
      <a href="/articles/${article.id}" class="article-card">
        <div class="article-image" style="background-image: url('${article.image}');">
          <span class="article-category">${article.category === 'dogs' ? '🐕 Dogs' : article.category === 'cats' ? '🐈 Cats' : article.category === 'nutrition' ? '🥗 Nutrition' : '🛡️ Prevention'}</span>
        </div>
        <div class="article-content">
          <h3 class="article-title">${article.title}</h3>
          <p class="article-excerpt">${article.excerpt}</p>
          <div class="article-meta">
            <span><i class="far fa-clock"></i> ${article.readTime}</span>
            <span><i class="far fa-calendar"></i> ${article.date}</span>
            <span class="read-more">Read more <i class="fas fa-arrow-right"></i></span>
          </div>
        </div>
      </a>
    `).join('');
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderArticles(btn.dataset.category);
    });
  });

  renderArticles('all');
</script>
{% endblock %}
